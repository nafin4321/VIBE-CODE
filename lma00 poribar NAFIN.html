<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nafins Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .profile-container {
      width: 100%;
      max-width: 1000px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .profile-header img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 5px solid #6366f1;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 30px #6366f1;
    }

    .profile-header h1 {
      font-size: 36px;
      background: linear-gradient(45deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      margin-top: 10px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .info-section {
      margin-top: 30px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.07);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      transition: 0.3s;
    }

    .info-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
    }

    .info-card h3 {
      margin-bottom: 10px;
      color: #a855f7;
    }

    .social-links {
      margin-top: 30px;
      text-align: center;
    }

    .social-links a {
      text-decoration: none;
      color: white;
      margin: 10px;
      padding: 12px 25px;
      border-radius: 30px;
      background: linear-gradient(45deg, #6366f1, #a855f7);
      transition: 0.3s;
      display: inline-block;
      font-weight: 500;
    }

    .social-links a:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #a855f7;
    }

    .troll-section {
      margin-top: 40px;
      text-align: center;
    }

    .troll-box {
      background: rgba(255, 255, 255, 0.07);
      padding: 20px;
      border-radius: 15px;
      margin-top: 15px;
    }

    .back-btn {
      margin-top: 40px;
      text-align: center;
    }

    .back-btn a {
      text-decoration: none;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      background: #334155;
      transition: 0.3s;
    }

    .back-btn a:hover {
      background: #6366f1;
    }

    @media (max-width: 768px) {
      .profile-container {
        padding: 25px;
      }

      .profile-header img {
        width: 150px;
        height: 150px;
      }

      .profile-header h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

<div class="profile-container">

    <h1>MAHMUDUL ALAM NAFIN</h1>
